<div class="bg-gray-800 rounded-lg p-6">
  <div class="mb-4">
    <h2 class="text-xl font-semibold text-white mb-2">Total Usage (Download + Upload)</h2>
    <p class="text-gray-400 text-sm">Combined network traffic</p>
  </div>

  @if (loading) {
    <div class="flex items-center justify-center h-64">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-purple-500"></div>
    </div>
  }

  @if (error) {
    <div class="p-4 bg-red-900/50 border border-red-700 rounded-lg">
      <p class="text-red-200">{{ error }}</p>
      <button (click)="loadData()" class="mt-2 px-4 py-2 bg-red-700 hover:bg-red-600 text-white rounded transition-colors">
        Retry
      </button>
    </div>
  }

  @if (!loading && !error) {
    <div class="space-y-8">
      @if (totalChartData.datasets.length > 0) {
        <div class="h-80">
          <canvas baseChart
            [data]="totalChartData"
            [options]="chartOptions"
            [type]="'bar'"
          ></canvas>
        </div>
      }

      @if (totalChartData.datasets.length === 0) {
        <div class="text-center py-12 text-gray-400">
          No data available
        </div>
      }
    </div>
  }
</div>
